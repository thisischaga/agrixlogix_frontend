<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100" fill="none">
  <!-- Cercle de fond (Conteneur premium) -->
  <rect width="100" height="100" rx="30" fill="#16A34A"/>
  
  <!-- Motif de traçabilité (Blockchain/Réseau) en arrière-plan de l'icône -->
  <circle cx="35" cy="35" r="3" fill="white" fill-opacity="0.4"/>
  <circle cx="65" cy="35" r="3" fill="white" fill-opacity="0.4"/>
  <circle cx="50" cy="75" r="3" fill="white" fill-opacity="0.4"/>
  <path d="M35 35L65 35L50 75L35 35" stroke="white" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="2 2"/>

  <!-- Icône Centrale : Pousse (Coopérative) stylisée avec traçabilité -->
  <g transform="translate(25, 25)">
    <!-- Tige centrale (Axe de données/croissance) -->
    <path d="M25 45V15" stroke="white" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Feuille Droite (Donnée/Produit) -->
    <path d="M25 25C35 25 45 15 45 5C35 5 25 15 25 25Z" fill="white"/>
    
    <!-- Feuille Gauche (Membre/Origine) -->
    <path d="M25 35C15 35 5 25 5 15C15 15 25 25 25 35Z" fill="white" fill-opacity="0.8"/>
    
    <!-- Nœud de traçabilité au sommet -->
    <circle cx="25" cy="15" r="5" fill="#16A34A" stroke="white" stroke-width="2"/>
  </g>
</svg>
